name: CI

on:
  push:
    branches:
      - master
      - main
      - fdv3
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
    steps:
      - name: Detect environment
        id: detect-env
        shell: bash
        run: |
          if [ "$GITHUB_ACTOR" == "nektos/act" ]; then
            echo "running_in_act=true" >> $GITHUB_OUTPUT
          else
            echo "running_in_act=false" >> $GITHUB_OUTPUT
          fi

      - name: Echo environment
        shell: bash
        run: |
          echo "Running in act environment: ${{ steps.detect-env.outputs.running_in_act }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for GitVersion to work properly

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: '5.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Display GitVersion outputs
        shell: bash
        env:
          GV_MAJOR: ${{ steps.gitversion.outputs.Major }}
          GV_MINOR: ${{ steps.gitversion.outputs.Minor }}
          GV_PATCH: ${{ steps.gitversion.outputs.Patch }}
          GV_NUGET: ${{ steps.gitversion.outputs.NuGetVersion }}
        run: |
          echo "Major: $GV_MAJOR"
          echo "Minor: $GV_MINOR"
          echo "Patch: $GV_PATCH"
          echo "NuGetVersion: $GV_NUGET"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.NuGetVersion }} /p:AssemblyVersion=${{ steps.gitversion.outputs.AssemblySemVer }} /p:FileVersion=${{ steps.gitversion.outputs.AssemblySemFileVer }}

      - name: Run tests (in act)
        if: steps.detect-env.outputs.running_in_act == 'true'
        env:
          TERM: dumb
          DOTNET_CLI_UI_LANGUAGE: en-US
        run: |
          echo "Running in act environment"
          dotnet test \
            --no-build \
            --configuration Release \
            --framework net10.0 \
            --filter "Category=Unit" \
            --logger "console;verbosity=detailed"

      - name: Run tests with coverage (in GitHub)
        if: steps.detect-env.outputs.running_in_act != 'true'
        run: >
          dotnet test
          --no-build
          --configuration Release
          --framework net10.0
          --filter "Category=Unit"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --settings coverletArgs.runsettings

      - name: Upload coverage reports to Codecov
        if: steps.detect-env.outputs.running_in_act != 'true' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Create NuGet packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Creating NuGet packages"
          dotnet pack --configuration Release --no-build --output packages /p:Version=${{ steps.gitversion.outputs.NuGetVersion }} /p:AssemblyVersion=${{ steps.gitversion.outputs.AssemblySemVer }} /p:FileVersion=${{ steps.gitversion.outputs.AssemblySemFileVer }}

      - name: Validate NuGet packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          EXPECTED=("FluentDocker" "FluentDocker.Testing.Xunit" "FluentDocker.Testing.MsTest" "FluentDocker.Testing.NUnit")
          for pkg in "${EXPECTED[@]}"; do
            ls packages/${pkg}.*.nupkg 1>/dev/null 2>&1 || { echo "MISSING: ${pkg}"; exit 1; }
            echo "OK: ${pkg}"
          done

      - name: List NuGet packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Created NuGet packages:"
          ls -la packages/*.nupkg

      - name: Upload NuGet packages as artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: packages/*.nupkg
          retention-days: 7
        continue-on-error: ${{ steps.detect-env.outputs.running_in_act == 'true' }}

      - name: Publish NuGet packages
        if: matrix.os == 'ubuntu-latest' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          dotnet nuget push "packages/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: ${{ steps.detect-env.outputs.running_in_act == 'true' }}

      - name: Create and push Git tag for release
        if: matrix.os == 'ubuntu-latest' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && steps.detect-env.outputs.running_in_act != 'true'
        env:
          GV_NUGET: ${{ steps.gitversion.outputs.NuGetVersion }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating Git tag for version: $GV_NUGET"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag "$GV_NUGET"
          git push origin "$GV_NUGET"

  # CodeQL Security Analysis
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: +security-and-quality

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build for CodeQL
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # Scheduled integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_integration == true)
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - run: dotnet restore

      - run: dotnet build --configuration Debug --no-restore

      - name: Run integration tests
        run: dotnet test FluentDocker.Tests/FluentDocker.Tests.csproj --configuration Debug --no-build --verbosity normal
        timeout-minutes: 30
