name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'FluentDocker/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate API reference from XML docs
        # Marked continue-on-error because XMLDoc2Markdown 5.x cannot
        # currently resolve net10.0/net8.0 transitive ref assemblies on
        # this project (System.IO.Pipelines 9.0). Swap to docfx or
        # xmldocmd in a follow-up. The docs site still builds without
        # the auto-generated API reference page.
        continue-on-error: true
        run: |
          dotnet restore FluentDocker/FluentDocker.csproj
          dotnet build FluentDocker/FluentDocker.csproj --configuration Release --no-restore
          dotnet tool install -g XMLDoc2Markdown
          mkdir -p docs/api-reference
          xmldoc2md FluentDocker/bin/Release/net8.0/FluentDocker.dll --output docs/api-reference --github-pages

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: docs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: |
          cd docs
          bundle install
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
